<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" fill="none">
  <defs>
    <linearGradient id="mGrad" x1="30" y1="6" x2="30" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D8FD6"/>
      <stop offset="100%" stop-color="#1B6CA8"/>
    </linearGradient>
    <clipPath id="mClip">
      <polygon points="30,6 56,54 4,54"/>
    </clipPath>
  </defs>

  <!-- ── MARK ── -->
  <!-- Mountain body (subtle fill) -->
  <polygon points="30,6 56,54 4,54" fill="#1B6CA8" opacity="0.18"/>
  <!-- Mountain outline -->
  <polygon points="30,6 56,54 4,54" fill="none" stroke="url(#mGrad)" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Gold crossbar — the horizon / el viento -->
  <line x1="16.5" y1="32" x2="43.5" y2="32" stroke="#C47D2A" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Gold peak dot -->
  <circle cx="30" cy="6" r="2.8" fill="#C47D2A"/>

  <!-- ── WORDMARK ── -->
  <text
    x="72" y="35"
    font-family="'Inter', 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="23"
    letter-spacing="2.5"
    fill="#FFFFFF">AONIK<tspan fill="#2D8FD6">LABS</tspan></text>

  <!-- Tagline -->
  <text
    x="73" y="50"
    font-family="'Inter', Arial, sans-serif"
    font-weight="400"
    font-size="7.5"
    letter-spacing="3"
    fill="#94A3B8">APPLIED TECHNOLOGY THINK TANK</text>
</svg>
