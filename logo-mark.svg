<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <defs>
    <linearGradient id="g" x1="28" y1="4" x2="28" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D8FD6"/>
      <stop offset="100%" stop-color="#1B6CA8"/>
    </linearGradient>
  </defs>
  <!-- Mountain body -->
  <polygon points="28,4 54,52 2,52" fill="#1B6CA8" opacity="0.18"/>
  <!-- Mountain outline -->
  <polygon points="28,4 54,52 2,52" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Gold crossbar — horizon / el viento -->
  <line x1="15" y1="30" x2="41" y2="30" stroke="#C47D2A" stroke-width="3" stroke-linecap="round"/>
  <!-- Gold peak -->
  <circle cx="28" cy="4" r="3" fill="#C47D2A"/>
</svg>
